{% extends 'base/base.html' %}

{% block title %}
Attiva workflow
{% endblock %}

{% block page_title %}
Attiva workflow pratica
{% endblock %}

{% block content %}

<style>
    form{
        background:white;
        padding:30px;
        border-radius:18px;
        box-shadow:0 8px 22px rgba(0,0,0,0.08);
        max-width:900px;
    }

    p{
        margin-bottom:18px;
    }

    label{
        display:block;
        font-weight:bold;
        margin-bottom:6px;
    }

    select, textarea{
        width:100%;
        padding:12px;
        border:1px solid #d1d5db;
        border-radius:8px;
    }

    button{
        background:#111827;
        color:white;
        border:0;
        padding:13px 20px;
        border-radius:8px;
        cursor:pointer;
    }

    .back{
        display:inline-block;
        margin-bottom:20px;
        text-decoration:none;
        color:#111827;
    }
</style>

<a class="back" href="/pratiche/{{ pratica.id }}/">
    ← Torna alla pratica
</a>

<form method="post">

    {% csrf_token %}

    <p>
        <strong>Pratica:</strong>
        {{ pratica }}
    </p>

    {{ form.as_p }}

    <button type="submit">
        Attiva workflow
    </button>

</form>

{% endblock %}
